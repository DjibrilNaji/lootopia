name: Build and deploy JAR app to Azure Web App - lootopia

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "microsoft"

      - name: Build with Maven
        env:
          DATASOURCE_URL: ${{ secrets.DATASOURCE_URL }}
          SECURITY_NAME: ${{ secrets.SECURITY_NAME }}
          SECURITY_PASSWORD: ${{ secrets.SECURITY_PASSWORD }}
        run: |
          cd server
          mvn clean install -D spring.profiles.active=remote -X

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: "${{ github.workspace }}/server/target/*.jar"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: "Production"
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7D1BF2EF2A48450CBFDF259EDEBDFD58 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_BE1BA4D8834B42198AC2D44E95D35DE8 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_253E566204FB418B8F263A669EDCDD23 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "lootopia"
          slot-name: "Production"
          package: "*.jar"

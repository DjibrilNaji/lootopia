on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

defaults:
  run:
    working-directory: client

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: npm install, ci
        run: npm ci
      - name: build
        run: npm run build

  jest-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: npm install, ci
        run: npm ci
      - name: npm run test:unit
        run: npm run test:unit

  cypress-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: npm install, ci
        run: npm ci
      - name: Build the server
        run: npm run build
      - name: Start the server
        run: npm run start &
      - name: npm cy:run
        run: npm run cy:run

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [lint-and-build, jest-test, cypress-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: "22.x"

      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present

      - name: Zip artifact for deployment
        run: zip release.zip ./* -r

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: client/release.zip
